services:
  - type: web
    name: esign-api
    runtime: node
    plan: free
    buildCommand: bash render-build.sh
    startCommand: pnpm --filter @esign/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.2
      - key: NODE_OPTIONS
        value: "--max-old-space-size=320"
      - key: DATABASE_URL
        fromDatabase:
          name: esign-postgres
          property: connectionString
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_KMS_KEY_ID
        sync: false
      - key: REDIS_URL
        fromService:
          name: esign-redis
          type: redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://esign-web.onrender.com
      - key: API_URL
        value: https://esign-api.onrender.com

  - type: web
    name: esign-web
    runtime: node
    plan: free
    buildCommand: bash render-web-build.sh
    startCommand: pnpm --filter @esign/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://esign-api.onrender.com
      - key: NEXTAUTH_URL
        value: https://esign-web.onrender.com
      - key: NEXTAUTH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: NEXT_PUBLIC_X402_PRICE_PER_SIGN
        value: "0.000091"

  - type: redis
    name: esign-redis
    plan: free

databases:
  - name: esign-postgres
    plan: free

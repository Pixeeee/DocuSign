services:
  - type: web
    name: esign-api
    runtime: node
    plan: free
    buildCommand: NODE_ENV=development pnpm install --frozen-lockfile && NODE_ENV=production pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.2
      - key: NODE_OPTIONS
        value: "--max-old-space-size=320"
      - key: DATABASE_URL
        fromDatabase:
          name: esign-postgres
          property: connectionString
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: API_URL
        value: https://${render.host}

  - type: pserv
    name: esign-postgres
    plan: free
    ipAllowList: []

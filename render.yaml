services:
  - type: web
    name: esign-api
    runtime: node
    plan: free
    buildCommand: bash render-build.sh
    preDeployCommand: pnpm --filter @esign/db migrate:deploy
    startCommand: pnpm --filter @esign/api start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: PNPM_CONFIG_PROD
        value: "false"
      - key: DB_POOL_MAX
        value: "5"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: NEXTAUTH_SECRET
        sync: false
      - key: DOWNLOAD_URL_SECRET
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AES_ENCRYPTION_KEY
        sync: false
      - key: STORAGE_PROVIDER
        value: s3
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_KMS_KEY_ID
        sync: false
      - key: X402_CHAIN_ID
        value: "84532"
      - key: X402_RPC_URL
        sync: false
      - key: X402_PRICE_PER_SIGN
        value: "0.0001"
      - key: X402_WALLET_ADDRESS
        sync: false
      - key: STELLAR_NETWORK
        value: testnet
      - key: STELLAR_HORIZON_URL
        value: https://horizon-testnet.stellar.org
      - key: STELLAR_WALLET_ADDRESS
        sync: false
      - key: STELLAR_PRICE_PER_SIGN
        value: "1.36"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: TOTP_APP_NAME
        value: eSign
      - key: TOTP_ISSUER
        value: eSign
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "100"
